name: Build on U-Boot Release

on:
  push:
    tags:
      - 'v*.*.*' # Matches version tags
  schedule:
    - cron: '0 0 * * *' # Daily at 00:00 UTC
  workflow_dispatch: # Allows manual triggers

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker build environment
        uses: devcontainers/ci@v0.2.0

      - name: Get latest non-rc tag
        id: get_latest_tag
        run: |
          echo "Fetching tags..."
          TAG=$(git tag --sort=-creatordate | grep -v '\-rc' | head -n 1)
          echo "Latest non-rc tag is $TAG"
          echo "::set-output name=tag::$TAG"

      - name: Check if build exists
        id: check_build
        run: |
          if [ -f "build_$TAG.log" ]; then
            echo "Build already exists for tag $TAG"
            echo "::set-output name=build_exists::true"
          else
            echo "No existing build for tag $TAG"
            echo "::set-output name=build_exists::false"
          fi

      - name: Build project
        if: steps.check_build.outputs.build_exists == 'false'
        run: |
          echo "Starting build process for tag ${{ steps.get_latest_tag.outputs.tag }}"
          # Insert build commands here
