name: Build on U-Boot Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Docker
        run: |
          echo 'Setting up Docker...'

      - name: Fetch latest U-Boot tag
        id: get_version
        run: |
          U_BOOT_VERSION=$(git ls-remote --tags https://github.com/u-boot/u-boot | awk '{print $2}' | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -n 1)
          echo "::set-output name=version::$U_BOOT_VERSION"

      - name: Check if build already exists
        id: check_build
        run: |
          if grep -q "$U_BOOT_VERSION" .builds-completed; then
            echo 'Build already exists. Skipping.';
            echo "::set-output name=build_exists::true";
          else
            echo 'No previous build found.';
            echo "::set-output name=build_exists::false";
          fi

      - name: Build Bootloader
        if: steps.check_build.outputs.build_exists == 'false'
        run: |
          TAG="${{ needs.check-latest-uboot.outputs.tag }}"
          docker build -f .devcontainer/Dockerfile -t bootloader:latest .
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace/u-boot \
            bootloader:latest
          echo "${TAG}" >> .builds-completed

