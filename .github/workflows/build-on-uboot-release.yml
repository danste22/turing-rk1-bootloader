name: Build on U-Boot Release

on:
  release:
    types: [published]
  workflow_dispatch: # Manual trigger support

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v2

      - name: Output latest tag
        run: echo "Latest tag is: $(git describe --tags `git rev-list --tags --max-count=1`)"
      
      - name: Check for existing builds
        id: check_build
        run: |
          # Logic to check for existing builds
          echo "No existing builds found."

      - name: Build using devcontainer
        uses: devcontainers-contrib/features@v1
        with:
          features: devcontainer-build

